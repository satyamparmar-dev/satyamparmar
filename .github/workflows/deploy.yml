# Deploy Vite static build to GitHub Pages at https://satyamparmar.blog
#
# Repo: https://github.com/satyamparmar-dev/satyamparmar
# Setup (one-time):
#   1. Settings → Pages → Source: GitHub Actions
#   2. Settings → Secrets → Actions:
#        VITE_STORAGE_SECRET          (encrypted localStorage)
#        VITE_APP_SECRET              (optional; auth hashing)
#        VITE_ALLOWLIST_CRYPTO_SECRET (optional; allowlist encryption)
#   3. Custom domain satyamparmar.blog + Enforce HTTPS (DNS already on GoDaddy)
#
# HashRouter + vite base '/' — routes use https://satyamparmar.blog/#/…

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          VITE_STORAGE_SECRET: ${{ secrets.VITE_STORAGE_SECRET }}
          VITE_APP_SECRET: ${{ secrets.VITE_APP_SECRET }}
          VITE_ALLOWLIST_CRYPTO_SECRET: ${{ secrets.VITE_ALLOWLIST_CRYPTO_SECRET }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
